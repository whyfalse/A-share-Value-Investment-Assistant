# ============================================================
# A股数据源配置示例
# 使用方法: 复制本文件为 data_source.yaml (同目录下),
#          再按你本地实际情况修改/启用对应数据源。
# 程序会按 sources 列表从上到下依次尝试,
# 第一个 enabled=true 且能成功取到数据的源会被使用。
# ============================================================

sources:
  # 1) akshare: 默认推荐,免费、无需注册/token,但依赖新浪/东方财富等公开接口,
  #    接口偶尔会变动,如失败请优先尝试更新 akshare: pip install -U akshare
  - type: akshare
    enabled: true

  # 2) tushare pro: 数据更稳定,但需要自行注册获取 token (https://tushare.pro)
  #    免费账号有积分限制,部分接口(如复权行情)可能需要较高积分。
  - type: tushare
    enabled: false
    token: "在此填入你的tushare token,或填 ${TUSHARE_TOKEN} 使用同名环境变量"

  # 3) efinance: 另一个免费的东方财富数据封装库,作为akshare的备用
  - type: efinance
    enabled: false

  # 4) 本地CSV: 如果你已经有自己导出的历史K线数据(比如从同花顺/通达信导出),
  #    可以直接指向本地文件,不依赖任何网络请求。
  #    path 中的 {code} 会被替换为6位股票代码,例如 600519。
  - type: local_csv
    enabled: false
    path: "./data/{code}.csv"
    # 如果你的CSV列名与标准字段不同,在此做映射(键=标准字段名,值=你CSV里的列名)
    # 标准字段: date, open, high, low, close, volume, amount(可选), turnover(可选)
    columns_map:
      date: "trade_date"
      open: "open"
      high: "high"
      low: "low"
      close: "close"
      volume: "vol"
      amount: "amount"
      turnover: "turnover_rate"
    # 你的CSV日期格式,供pandas解析,常见如 "%Y-%m-%d" 或 "%Y%m%d"
    date_format: "%Y-%m-%d"

# 基准指数(用于计算个股相对大盘的相对强弱,可选功能)
# 默认使用沪深300作为通用基准;如果该项抓取失败,程序会自动跳过相对强弱这一维度
# 并把权重按比例分配给其余维度,不会导致整体分析失败。
benchmark:
  enabled: true
  code: "000300"  # 沪深300,也可填 "000001"(上证指数)或 "399001"(深证成指)
